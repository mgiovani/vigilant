# Vigilant Configuration File

blocklist:
  # Process names to block (case-insensitive)
  processes:
    - "Discord"
    - "Discord.exe"
    - "Slack"
    - "Slack.exe"
    - "Steam"
    - "Steam.exe"
    - "Battle.net"

  # Website domains to block (simple substring matching, case-insensitive)
  # For domains that appear in URLs/titles directly
  websites:
    - "youtube.com"
    - "twitter.com"
    - "x.com"
    - "reddit.com"
    - "instagram.com"
    - "tiktok.com"
    - "facebook.com"
    - "twitch.tv"

  # Regex patterns for advanced matching (case-insensitive by default)
  # These patterns match browser tab titles which typically show:
  # "Page Title - Site Name" or "Page Title | Site Name"
  patterns:
    # YouTube: "Video Title - YouTube" or YouTube in URL
    - "- YouTube$"
    - "\\| YouTube$"
    # Twitter/X: Various formats like "Post / X", "Profile / X", "Home / X"
    - " [/\\|\\-] X$"
    # Reddit: "Post Title : subreddit" or "- Reddit"
    - "- Reddit$"
    - " : r/"
    # Instagram: "Photo/Video by @user" or "- Instagram"
    - "- Instagram$"
    - "Instagram$"
    # TikTok: "Video - TikTok" or "TikTok - Make Your Day"
    - "- TikTok"
    - "TikTok -"
    # Facebook: Various formats
    - "- Facebook$"
    - "\\| Facebook$"
    # Twitch: "Streamer - Twitch"
    - "- Twitch$"
    # Streaming services
    - "Netflix"
    - "Prime Video"
    - "Disney\\+"
    - "Hulu"
    - "HBO Max"
    - "Paramount\\+"

# Exceptions - allow these even if they match blocklist
exceptions:
  - "YouTube Music"        # Allow music streaming
  - "Work - YouTube"       # Allow work-related YouTube
  - "YouTube Studio"       # Allow content creation

player:
  # YouTube playlist or video URL for lofi music
  lofi_playlist: "https://www.youtube.com/watch?v=jfKfPfyJRdk"

  # Path to FBI meme video (embedded:// for bundled assets)
  fbi_meme_source: "embedded://fbi-meme.mp4"

  # Default volume (0.0 - 1.0)
  default_volume: 0.5

monitor:
  # How often to check active window (duration)
  poll_interval: 100ms

  # Grace period before triggering FBI meme (duration)
  grace_period: 500ms

ui:
  # UI mode: "gui" or "tui" (future)
  mode: "gui"

  # Prefer second monitor for app window
  second_monitor: true

  # Keep window always on top
  always_on_top: false
