# Vigilant Configuration File
#
# All patterns are regex-based and case-insensitive.
# Patterns match against both window titles AND process names.
#
# Examples:
#   - "discord"       → matches "Discord", "DISCORD.EXE", "Discord - Chat"
#   - "youtube"       → matches "YouTube - Video", "youtube.com"
#   - "reddit\\.com"  → matches "reddit.com" but not "reddit_com"
#   - "^steam$"       → matches only "Steam" exactly (not "SteamVR")

blocklist:
  patterns:
    # Apps (matches process name or window title)
    - "discord"
    - "steam"
    - "battle\\.net"

    # Social media & websites (matches browser tab titles)
    - "youtube"
    - "twitter"
    - "\\bx\\.com\\b"           # X.com (word boundaries to avoid false matches)
    - "reddit"
    - "instagram"
    - "tiktok"
    - "facebook"
    - "twitch"

    # Streaming services
    - "netflix"
    - "prime video"
    - "disney\\+"
    - "hulu"
    - "hbo max"
    - "paramount\\+"

# Exceptions - patterns that bypass blocklist when matched
# Also regex-based and case-insensitive
exceptions:
  - "youtube music"       # Allow music streaming
  - "youtube studio"      # Allow content creation

player:
  # YouTube playlist or video URL for lofi music
  lofi_playlist: "https://www.youtube.com/watch?v=jfKfPfyJRdk"

  # Path to FBI meme video (embedded:// for bundled assets)
  fbi_meme_source: "embedded://fbi-meme.mp4"

  # Default volume (0.0 - 1.0)
  default_volume: 0.5

monitor:
  # How often to check active window (duration)
  poll_interval: 100ms

  # Grace period before triggering FBI meme (duration)
  grace_period: 500ms

ui:
  # UI mode: "gui" or "tui" (future)
  mode: "gui"

  # Prefer second monitor for app window
  second_monitor: true

  # Keep window always on top
  always_on_top: false
